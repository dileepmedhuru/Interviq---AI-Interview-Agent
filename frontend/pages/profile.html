<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile — Interview Agent</title>
    <link rel="icon" href="../public/favicon.ico"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/base.css"/>
    <link rel="stylesheet" href="../css/3d-effects.css"/>
    <link rel="stylesheet" href="../css/animations.css"/>
    <link rel="stylesheet" href="../css/components.css"/>
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="/pages/dashboard.html">
        <div class="nav-logo">🎯</div> Interview Agent
    </a>
    <div class="nav-actions">
        <a href="/pages/dashboard.html" class="btn btn-secondary btn-sm">← Dashboard</a>
        <button class="btn btn-ghost btn-sm" data-action="logout">Sign out</button>
    </div>
</nav>

<main class="container" style="max-width:640px;padding:2rem 1.5rem">

    <div class="page-header page-enter" style="margin-bottom:2rem">
        <h1>Profile</h1>
        <p>Manage your account details and security.</p>
    </div>

    <!-- Avatar + Info card -->
    <div class="card" style="margin-bottom:1.25rem">
        <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:1.75rem">
            <div class="avatar avatar-lg" id="profile-avatar"
                style="width:64px;height:64px;font-size:1.5rem;border-radius:50%;
                       background:linear-gradient(135deg,var(--purple-400),var(--accent));
                       display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">
                ?
            </div>
            <div>
                <div id="profile-name"
                    style="font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:2px">
                    Loading…
                </div>
                <div id="profile-email"
                    style="font-size:0.875rem;color:var(--text-muted);margin-bottom:6px">
                    …
                </div>
                <div id="verified-badge" class="chip chip-teal" style="display:none;font-size:0.72rem">
                    ✓ Email verified
                </div>
            </div>
        </div>

        <form id="profile-form" novalidate>
            <div class="field">
                <label for="name">Display name</label>
                <input id="name" type="text" class="input" placeholder="Your full name" required/>
            </div>
            <button type="submit" id="profile-save-btn" class="btn btn-primary ripple">
                Save changes
            </button>
        </form>
    </div>

    <!-- Change password -->
    <div class="card" style="margin-bottom:1.25rem">
        <h3 style="margin-bottom:1.25rem;font-size:1rem">Change password</h3>
        <div id="pwd-success" class="alert alert-success hidden" style="margin-bottom:1rem">
            ✅ Password updated successfully!
        </div>
        <div id="pwd-error" class="alert alert-error hidden" style="margin-bottom:1rem"></div>
        <form id="password-form" novalidate>
            <div class="field">
                <label for="current-password">Current password</label>
                <input id="current-password" type="password" class="input" placeholder="Your current password"/>
            </div>
            <div class="field">
                <label for="new-password">New password</label>
                <input id="new-password" type="password" class="input" placeholder="Min 8 characters"/>
            </div>
            <div class="field">
                <label for="confirm-new-password">Confirm new password</label>
                <input id="confirm-new-password" type="password" class="input" placeholder="Repeat new password"/>
            </div>
            <button type="submit" id="password-save-btn" class="btn btn-primary ripple">
                Update password
            </button>
        </form>
    </div>

    <!-- Stats -->
    <div class="card">
        <h3 style="margin-bottom:1.25rem;font-size:1rem">Your stats</h3>
        <div class="grid-2" style="gap:1rem">
            <div style="text-align:center;padding:1.25rem;background:var(--surface-2);border-radius:var(--radius-lg)">
                <div class="stat-value" id="p-total" style="font-size:1.75rem;font-weight:800;color:var(--text-primary)">—</div>
                <div class="stat-label" style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Total interviews</div>
            </div>
            <div style="text-align:center;padding:1.25rem;background:var(--surface-2);border-radius:var(--radius-lg)">
                <div class="stat-value" id="p-avg" style="font-size:1.75rem;font-weight:800;color:var(--text-primary)">—</div>
                <div class="stat-label" style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Avg score</div>
            </div>
            <div style="text-align:center;padding:1.25rem;background:var(--surface-2);border-radius:var(--radius-lg)">
                <div class="stat-value" id="p-completed" style="font-size:1.75rem;font-weight:800;color:var(--text-primary)">—</div>
                <div class="stat-label" style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Completed</div>
            </div>
            <div style="text-align:center;padding:1.25rem;background:var(--surface-2);border-radius:var(--radius-lg)">
                <div class="stat-value" id="p-best" style="font-size:1.75rem;font-weight:800;color:var(--text-primary)">—</div>
                <div class="stat-label" style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Best score</div>
            </div>
        </div>
    </div>

</main>

<div id="toast-container"></div>
<script type="module">
import { requireAuth, showToast, $, $$, setLoading, initials } from '../js/utils.js';
import { userApi, authApi } from '../js/api.js';

(async () => {
    const user = await requireAuth();
    if (!user) return;

    // Populate profile
    const av = $('#profile-avatar');
    if (av) av.textContent = initials(user.name);
    setText('#profile-name',  user.name);
    setText('#profile-email', user.email);
    if ($('#name')) $('#name').value = user.name;
    if (user.isVerified) {
        const badge = $('#verified-badge');
        if (badge) badge.style.display = 'inline-flex';
    }

    // Load stats
    try {
        const { stats } = await userApi.getStats();
        setText('#p-total',     stats.total ?? 0);
        setText('#p-avg',       stats.avgScore ? `${stats.avgScore}/10` : '—');
        setText('#p-completed', stats.completed ?? 0);
        setText('#p-best',      stats.best ? `${stats.best}/10` : '—');
    } catch (_) {}

    // Profile form
    $('#profile-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn  = $('#profile-save-btn');
        const name = $('#name').value.trim();
        if (!name) { showToast('Name cannot be empty', 'warning'); return; }
        setLoading(btn, true, 'Saving…');
        try {
            await userApi.updateProfile({ name });
            showToast('Profile updated ✅', 'success');
            setText('#profile-name', name);
            const av = $('#profile-avatar');
            if (av) av.textContent = initials(name);
        } catch (err) {
            showToast(err.message || 'Update failed', 'error');
        } finally {
            setLoading(btn, false, 'Save changes');
        }
    });

    // Password form
    $('#password-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn     = $('#password-save-btn');
        const current = $('#current-password').value;
        const newPwd  = $('#new-password').value;
        const confirm = $('#confirm-new-password').value;
        const errEl   = $('#pwd-error');
        const okEl    = $('#pwd-success');

        errEl.classList.add('hidden');
        okEl.classList.add('hidden');

        if (!current)          { showError(errEl, 'Current password is required'); return; }
        if (newPwd.length < 8) { showError(errEl, 'New password must be at least 8 characters'); return; }
        if (newPwd !== confirm) { showError(errEl, 'Passwords do not match'); return; }

        setLoading(btn, true, 'Updating…');
        try {
            await userApi.changePassword({ currentPassword: current, newPassword: newPwd });
            okEl.classList.remove('hidden');
            $('#password-form').reset();
        } catch (err) {
            showError(errEl, err.message || 'Password update failed');
        } finally {
            setLoading(btn, false, 'Update password');
        }
    });

    // Logout
    $$('[data-action="logout"]').forEach(el => {
        el.addEventListener('click', async () => {
            try { await authApi.logout(); } catch(_) {}
            sessionStorage.clear();
            location.href = '/pages/login.html';
        });
    });
})();

function setText(sel, val) { const el=$(sel); if(el) el.textContent=val; }
function showError(el, msg) { el.textContent=msg; el.classList.remove('hidden'); }
</script>
</body>
</html>
