<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Interview — Interview Agent</title>
    <link rel="icon" href="../public/favicon.ico"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/base.css"/>
    <link rel="stylesheet" href="../css/3d-effects.css"/>
    <link rel="stylesheet" href="../css/animations.css"/>
    <link rel="stylesheet" href="../css/components.css"/>
    <link rel="stylesheet" href="../css/interview.css"/>
    <style>
        /* MCQ styles */
        .mcq-options { display:flex; flex-direction:column; gap:10px; margin-top:1rem; }
        .mcq-option {
            display:flex; align-items:center; gap:12px;
            padding:12px 16px; border-radius:var(--radius-md);
            border:1px solid var(--border-strong); background:var(--surface);
            cursor:pointer; transition:all var(--transition); font-size:0.9rem;
            color:var(--text-primary);
        }
        .mcq-option:hover { border-color:var(--accent-light); background:var(--purple-50); }
        .mcq-option.selected { border-color:var(--accent); background:var(--purple-50); color:var(--accent); font-weight:600; }
        .mcq-option.correct  { border-color:var(--success); background:#e1f5ee; color:var(--success); font-weight:600; }
        .mcq-option.wrong    { border-color:var(--danger);  background:#fcebeb; color:var(--danger); }
        .mcq-letter {
            width:28px; height:28px; border-radius:50%; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:0.78rem; font-weight:700;
            background:var(--surface-2); border:1px solid var(--border-strong);
        }

        /* Code editor styles */
        .code-editor-wrap {
            border:1px solid var(--border-strong); border-radius:var(--radius-lg);
            overflow:hidden; margin-top:1rem;
            box-shadow:var(--shadow-sm);
        }
        .code-editor-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:10px 14px; background:var(--gray-900); border-bottom:1px solid rgba(255,255,255,0.08);
        }
        .code-lang-select {
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
            color:#fff; border-radius:6px; padding:4px 10px; font-size:0.78rem;
            cursor:pointer; font-family:var(--font);
        }
        .code-lang-select option { background:#1a1830; color:#fff; }
        .code-run-btn {
            display:flex; align-items:center; gap:6px;
            background:linear-gradient(135deg,#1D9E75,#0F6E56);
            color:#fff; border:none; border-radius:6px;
            padding:5px 14px; font-size:0.78rem; font-weight:600; cursor:pointer;
            transition:all .2s;
        }
        .code-run-btn:hover { opacity:.85; transform:translateY(-1px); }
        #code-input {
            width:100%; min-height:200px; max-height:340px;
            background:#1a1830; color:#e8e6f0;
            font-family:'JetBrains Mono', monospace; font-size:0.88rem;
            line-height:1.7; padding:16px; border:none; outline:none;
            resize:vertical; tab-size:4;
        }
        .code-output {
            background:#0f0e1e; color:#a8e6cf;
            font-family:'JetBrains Mono', monospace; font-size:0.82rem;
            padding:12px 16px; min-height:48px; max-height:120px;
            overflow-y:auto; border-top:1px solid rgba(255,255,255,0.06);
            white-space:pre-wrap; display:none;
        }
        .code-output.visible { display:block; }
        .code-output.error   { color:#f87171; }

        /* Question type badge */
        .q-type-badge {
            display:inline-flex; align-items:center; gap:6px;
            padding:4px 12px; border-radius:var(--radius-full);
            font-size:0.72rem; font-weight:700; letter-spacing:.04em;
            text-transform:uppercase; margin-bottom:12px;
        }
        .q-type-mcq     { background:#e6f1fb; color:#0c447c; }
        .q-type-coding  { background:#e1f5ee; color:#085041; }
        .q-type-open    { background:var(--purple-50); color:var(--accent); }
        .q-type-behavioral { background:var(--amber-50); color:var(--amber-800); }
    </style>
</head>
<body>
<div class="interview-layout">

    <!-- Header -->
    <header class="interview-header">
        <div class="interview-header-left">
            <a href="/pages/dashboard.html" class="btn btn-ghost btn-sm btn-icon">←</a>
            <div>
                <div class="interview-role-badge" id="header-role">Loading…</div>
                <div class="text-xs text-muted" id="header-level"></div>
            </div>
        </div>
        <div class="interview-progress-wrap">
            <div class="interview-progress-label">
                <span>Progress</span>
                <span id="progress-text">0 / 0</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
        </div>
        <div class="interview-timer">⏱ <span id="timer-display">00:00</span></div>
    </header>

    <!-- Body -->
    <main class="interview-body" id="interview-body">

        <!-- Loading -->
        <div id="loading-state" class="text-center" style="padding:4rem 0">
            <div class="spinner spinner-lg" style="margin:0 auto 1rem"></div>
            <p class="text-muted">Preparing your personalised interview…</p>
        </div>

        <!-- Chat area -->
        <div id="chat-area" class="chat-area hidden"></div>

        <!-- MCQ area -->
        <div id="mcq-area" class="hidden" style="margin-bottom:1.5rem">
            <div class="mcq-options" id="mcq-options"></div>
            <button id="mcq-submit-btn" class="btn btn-primary btn-sm ripple"
                style="margin-top:1rem;display:none">
                Submit answer →
            </button>
        </div>

        <!-- Code editor area -->
        <div id="code-area" class="hidden" style="margin-bottom:1.5rem">
            <div class="code-editor-wrap">
                <div class="code-editor-header">
                    <div style="display:flex;align-items:center;gap:8px">
                        <span style="color:rgba(255,255,255,0.5);font-size:0.78rem">Language:</span>
                        <select class="code-lang-select" id="code-lang">
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <option value="java">Java</option>
                            <option value="c">C</option>
                            <option value="cpp">C++</option>
                            <option value="sql">SQL</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center">
                        <span style="color:rgba(255,255,255,0.3);font-size:0.72rem" id="code-hint"></span>
                        <button class="code-run-btn" id="code-run-btn">▶ Run</button>
                    </div>
                </div>
                <textarea id="code-input" spellcheck="false"
                    placeholder="// Write your code here..."></textarea>
                <div class="code-output" id="code-output"></div>
            </div>
            <button id="code-submit-btn" class="btn btn-primary btn-sm ripple" style="margin-top:0.75rem">
                Submit code →
            </button>
        </div>

        <!-- Complete splash -->
        <div id="complete-splash" class="complete-splash hidden">
            <div class="complete-icon">✅</div>
            <h2>Interview complete!</h2>
            <p>Great job! Generating your evaluation report now…</p>
            <button id="get-report-btn" class="btn btn-primary btn-lg ripple">
                <span class="spinner spinner-sm hidden" id="report-spinner"></span>
                Get my report →
            </button>
        </div>

        <!-- Text answer area -->
        <div id="answer-area" class="answer-area hidden">
            <textarea id="answer-input"
                placeholder="Type your answer here… (Ctrl+Enter to submit)"
                maxlength="2000"></textarea>
            <div class="answer-area-footer">
                <span class="answer-char-count"><span id="char-count">0</span> / 2000</span>
                <div class="answer-actions">
                    <button id="voice-btn" class="btn btn-secondary btn-sm" title="Voice input">🎤</button>
                    <button id="clear-btn"  class="btn btn-ghost btn-sm">Clear</button>
                    <button id="submit-answer-btn" class="btn btn-primary btn-sm ripple" disabled>
                        Submit answer →
                    </button>
                </div>
            </div>
        </div>

    </main>
</div>

<div id="toast-container"></div>
<script type="module" src="../js/interview.js"></script>
</body>
</html>
