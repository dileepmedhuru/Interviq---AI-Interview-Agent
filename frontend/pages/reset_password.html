<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — Interview Agent</title>
    <link rel="icon" href="../public/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/3d-effects.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/auth.css" />
</head>
<body data-page="reset">

<div class="auth-page">
    <div class="auth-panel">
        <div class="orb orb-1"></div>
        <div class="auth-panel-content">
            <div class="auth-panel-logo">🔐</div>
            <h2>Choose a new password</h2>
            <p>Pick something strong — at least 8 characters, ideally with numbers and symbols.</p>
        </div>
    </div>

    <div class="auth-form-area">
        <div class="auth-form-box fade-up">
            <h1 class="auth-title">New password</h1>
            <p class="auth-subtitle">Set a new password for your account.</p>

            <div id="form-error" class="alert alert-error hidden"></div>
            <div id="success-msg" class="alert alert-success hidden">
                ✅ Password reset! Redirecting to sign in…
            </div>

            <form id="reset-form" class="auth-form" novalidate>
                <div class="field">
                    <label for="password">New password</label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input id="password" type="password" class="input" placeholder="Min 8 characters" autocomplete="new-password" required />
                    </div>
                </div>
                <div class="field">
                    <label for="confirm-password">Confirm new password</label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input id="confirm-password" type="password" class="input" placeholder="Repeat password" autocomplete="new-password" required />
                    </div>
                </div>
                <div style="margin-top:0.5rem">
                    <button id="submit-btn" type="submit" class="btn btn-primary btn-full btn-lg ripple">
                        Reset password
                    </button>
                </div>
            </form>

            <p class="auth-footer"><a href="login.html">← Back to sign in</a></p>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<script type="module" src="../js/auth.js"></script>
</body>
</html>
