<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password — Interviq - An AI Interview Agent </title>
    <link rel="icon" href="../public/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/base.css?v=15" />
    <link rel="stylesheet" href="../css/3d-effects.css?v=15" />
    <link rel="stylesheet" href="../css/animations.css?v=15" />
    <link rel="stylesheet" href="../css/auth.css?v=15" />
</head>
<body data-page="forgot">

<div class="auth-page">
    <div class="auth-panel">
    <a href="/pages/index.html" style="position:absolute; top:1.5rem; left:1.5rem; color:#fff; text-decoration:none; font-weight:500; z-index:100; font-size: 0.9rem; background:rgba(255,255,255,0.1); padding:6px 12px; border-radius:8px;">&larr; Home</a>

        <div class="orb orb-1"></div>
        <div class="auth-panel-content">
            <a href="/pages/index.html" style="text-decoration:none; display:block;"><div class="auth-panel-logo"><img src="../public/logo.png?v=2" alt="Interviq Logo" /></div></a>
            <h2>Reset your password</h2>
            <p>We'll send a secure reset link to your email. Check your spam folder if you don't see it.</p>
        </div>
    </div>

    <div class="auth-form-area">
        <div class="auth-form-box fade-up">
            <h1 class="auth-title">Forgot password?</h1>
            <p class="auth-subtitle">Enter your email and we'll send a reset link.</p>

            <div id="form-error" class="alert alert-error hidden"></div>
            <div id="success-msg" class="alert alert-success hidden">
                ✅ Reset link sent! Check your inbox (and spam folder).
            </div>

            <form id="forgot-form" class="auth-form" novalidate>
                <div class="field">
                    <label for="email">Email address</label>
                    <div class="input-group">
                        <span class="input-icon">✉</span>
                        <input id="email" type="email" class="input" placeholder="you@example.com" autocomplete="email" required />
                    </div>
                </div>
                <div style="margin-top:0.5rem">
                    <button id="submit-btn" type="submit" class="btn btn-primary btn-full btn-lg ripple">
                        Send reset link
                    </button>
                </div>
            </form>

            <p class="auth-footer"><a href="login.html">← Back to sign in</a></p>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<script type="module" src="../js/auth.js"></script>
</body>
</html>
