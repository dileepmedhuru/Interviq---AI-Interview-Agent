<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report — Interview Agent</title>
    <link rel="icon" href="../public/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/3d-effects.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

<!-- Nav -->
<nav class="nav">
    <a class="nav-brand" href="dashboard.html">
        <div class="nav-logo">🎯</div>
        Interview Agent
    </a>
    <div class="nav-actions">
        <a href="dashboard.html" class="btn btn-secondary btn-sm">← Dashboard</a>
    </div>
</nav>

<!-- Loading -->
<div id="loading-state" style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <div class="spinner spinner-lg" style="margin-bottom:1rem"></div>
    <p class="text-muted">Loading your report…</p>
</div>

<!-- Report body (hidden until loaded) -->
<main id="report-body" class="container" style="max-width:820px;padding:2rem 1.5rem;display:none">

    <!-- Header -->
    <div class="page-enter" style="margin-bottom:2rem">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem">
            <div>
                <div class="chip chip-teal" style="margin-bottom:10px" id="report-role-chip">Role</div>
                <h1 style="font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;color:var(--text-primary)">
                    Interview Report
                </h1>
                <p id="report-meta" class="text-sm text-muted mt-1"></p>
            </div>
            <div id="overall-ring"></div>
        </div>
    </div>

    <!-- Summary -->
    <div class="card mb-3" id="summary-card" style="margin-bottom:1.25rem">
        <h3 style="margin-bottom:12px">Summary</h3>
        <p id="report-summary" style="font-size:0.95rem;line-height:1.7;color:var(--text-secondary)"></p>
    </div>

    <!-- Score bars -->
    <div class="card mb-3" style="margin-bottom:1.25rem">
        <h3 style="margin-bottom:1.25rem">Score breakdown</h3>
        <div id="score-bars"></div>
    </div>

    <!-- Strengths + Areas to improve -->
    <div class="grid-2" style="gap:1.25rem;margin-bottom:1.25rem">
        <div class="card">
            <h3 style="margin-bottom:1rem;color:var(--success)">✅ Strengths</h3>
            <ul id="strengths-list" style="display:flex;flex-direction:column;gap:8px"></ul>
        </div>
        <div class="card">
            <h3 style="margin-bottom:1rem;color:var(--warning)">⚡ Areas to improve</h3>
            <ul id="improve-list" style="display:flex;flex-direction:column;gap:8px"></ul>
        </div>
    </div>

    <!-- Feedback -->
    <div class="card" style="margin-bottom:1.25rem">
        <h3 style="margin-bottom:1rem">Detailed feedback</h3>
        <div id="feedback-list"></div>
    </div>

    <!-- Recommendations -->
    <div class="card" style="margin-bottom:2rem">
        <h3 style="margin-bottom:1rem">💡 Recommendations</h3>
        <ol id="recommendations-list" style="display:flex;flex-direction:column;gap:10px;padding-left:1.25rem;list-style:decimal"></ol>
    </div>

    <!-- Q&A review -->
    <div style="margin-bottom:2rem">
        <h3 style="margin-bottom:1.25rem;color:var(--text-primary)">Your answers</h3>
        <div id="qa-list" style="display:flex;flex-direction:column;gap:1rem"></div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding-bottom:3rem">
        <a href="dashboard.html" class="btn btn-secondary btn-lg">Back to dashboard</a>
        <button id="new-interview-btn" class="btn btn-primary btn-lg ripple">Practice again →</button>
    </div>
</main>

<div id="toast-container"></div>
<script type="module" src="../js/report.js"></script>
</body>
</html>
