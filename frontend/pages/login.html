<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Interviq - An AI Interview Agent </title>
    <link rel="icon" href="../public/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/3d-effects.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/auth.css?v=12" />
</head>
<body data-page="login">

<div class="auth-page">

    <!-- Left decorative panel -->
    <div class="auth-panel">
    <a href="/pages/index.html" style="position:absolute; top:1.5rem; left:1.5rem; color:#fff; text-decoration:none; font-weight:500; z-index:100; font-size: 0.9rem; background:rgba(255,255,255,0.1); padding:6px 12px; border-radius:8px;">&larr; Home</a>

        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="auth-panel-content">
            <a href="/pages/index.html" style="text-decoration:none; display:block;"><div class="auth-panel-logo"><img src="../public/logo.png?v=2" alt="Interviq Logo" /></div></a>
            <h2>Welcome back</h2>
            <p>Continue practising and track your interview performance over time.</p>
            <div class="auth-panel-features">
                <div class="auth-feature">
                    <div class="auth-feature-icon">📄</div>
                    Resume-tailored questions
                </div>
                <div class="auth-feature">
                    <div class="auth-feature-icon">🤖</div>
                    AI feedback
                </div>
                <div class="auth-feature">
                    <div class="auth-feature-icon">📈</div>
                    Track your progress
                </div>
            </div>
        </div>
    </div>

    <!-- Right form area -->
    <div class="auth-form-area">
        <div class="auth-form-box fade-up">

            <!-- Mobile logo -->
            <div class="auth-logo-mobile">
                <div style="display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:1.1rem;color:var(--text-primary)">
                    <div style="width:36px;height:36px;border-radius:10px;overflow:hidden"><img src="../public/logo.png?v=2" alt="Interviq Logo" style="width:100%;height:100%;object-fit:contain;border-radius:inherit;" /></div>
                    Interviq <span style="font-size:0.8rem;font-weight:500;color:var(--text-muted);margin-left:4px;">- An AI Interview Agent</span>
                </div>
            </div>

            <h1 class="auth-title">Sign in</h1>
            <p class="auth-subtitle">Don't have an account? <a href="signup.html">Create one free</a></p>

            <!-- Error alert -->
            <div id="form-error" class="alert alert-error hidden"></div>

            <form id="login-form" class="auth-form" novalidate>
                <div class="field">
                    <label for="email">Email address</label>
                    <div class="input-group">
                        <span class="input-icon">✉</span>
                        <input id="email" type="email" class="input" placeholder="you@example.com" autocomplete="email" required />
                    </div>
                </div>

                <div class="field">
                    <label for="password">
                        Password
                        <a href="forgot_password.html" style="float:right;color:var(--accent);font-size:0.78rem;font-weight:500">Forgot?</a>
                    </label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input id="password" type="password" class="input" placeholder="Your password" autocomplete="current-password" required />
                        <button type="button" id="toggle-password" class="input-icon-right" title="Show/hide password">👁</button>
                    </div>
                </div>

                <div style="margin-top:0.5rem">
                    <button id="submit-btn" type="submit" class="btn btn-primary btn-full btn-lg ripple">
                        Sign in
                    </button>
                </div>
            </form>

            <p class="auth-footer">
                New here? <a href="signup.html">Create a free account →</a>
            </p>
        </div>
    </div>
</div>

<div id="toast-container"></div>
<script type="module" src="../js/auth.js"></script>
</body>
</html>
